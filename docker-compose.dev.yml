services:
  # Postgres with pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sb
      POSTGRES_PASSWORD: sbpass
      POSTGRES_DB: sbdb
    ports: ["5432:5432"]
    volumes:
      - ./infra/postgres/data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sb -d sbdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/sbneo4jpass
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - ./infra/neo4j/data:/data
      - ./infra/neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p sbneo4jpass 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api:
    build: ./apps/api-gateway
    ports: ["8000:80"]
    environment:
      - DB_URL=postgresql://sb:sbpass@db:5432/sbdb
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=sbneo4jpass
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      db:
        condition: service_started
      neo4j:
        condition: service_started
    restart: unless-stopped

  # Frontend
  frontend:
    build: ./apps/frontend
    ports: ["3000:80"]
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
